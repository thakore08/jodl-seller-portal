<svg width="420" height="260" viewBox="0 0 420 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1f1b3a"/>
    </linearGradient>
    <linearGradient id="thumb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3459ea"/>
      <stop offset="60%" stop-color="#575ef4"/>
      <stop offset="100%" stop-color="#fb5457"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0b1020" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="420" height="260" rx="22" fill="url(#bg)"/>

  <!-- Top rail -->
  <rect x="24" y="24" width="372" height="60" rx="16" fill="rgba(255,255,255,0.06)" stroke="rgba(148,163,184,0.2)"/>

  <!-- Toggle -->
  <g transform="translate(250 34)" filter="url(#soft)">
    <rect x="0" y="0" width="120" height="42" rx="21" fill="rgba(15,23,42,0.6)" stroke="rgba(148,163,184,0.35)"/>
    <rect x="6" y="6" width="52" height="30" rx="15" fill="url(#thumb)"/>
    <circle cx="32" cy="21" r="8" fill="#ffffff"/>
    <path d="M78 16a8 8 0 1 0 0 10" fill="none" stroke="rgba(148,163,184,0.9)" stroke-width="2"/>
  </g>

  <!-- Mode cue -->
  <g transform="translate(310 8)">
    <text x="0" y="12" font-size="12" font-weight="800" fill="#bfdbfe" font-family="Arial, sans-serif">MODE</text>
    <path d="M18 16 V34" stroke="#bfdbfe" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M12 30 L18 38 L24 30" stroke="#bfdbfe" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Live sync pill -->
  <g transform="translate(24 108)">
    <rect x="0" y="0" width="150" height="28" rx="14" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.35)"/>
    <circle cx="14" cy="14" r="6" fill="#34d399"/>
    <text x="28" y="18" font-size="12" fill="#a7f3d0" font-family="Arial, sans-serif">Live sync enabled</text>
  </g>

  <!-- Collapse cue -->
  <g transform="translate(240 160)">
    <path d="M170 22 H20" stroke="#93c5fd" stroke-width="3.2" stroke-linecap="round"/>
    <path d="M30 14 L18 22 L30 30" stroke="#93c5fd" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="0" y="20" font-size="14" font-weight="800" fill="#bfdbfe" font-family="Arial, sans-serif">Collapse</text>
  </g>
</svg>
